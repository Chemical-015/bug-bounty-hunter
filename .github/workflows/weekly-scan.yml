name: Weekly Scan
on:
  schedule:
    - cron: '30 20 * * 0'
  workflow_dispatch:
jobs:
  # ─── 1. COMBINED WEEKLY SCAN ───────────────────────────────────
  # JWT + GraphQL + Swagger + Git/Env + Exposed Files +
  # Default Logins + Dev Tools + S3 + SpringBoot
  # Uses nuclei default templates filtered by tags
  weekly_combined:
    uses: ./.github/workflows/scan-template.yml
    with:
      scan_name: "Weekly Combined"
      tags: "jwt,graphql,swagger,api-docs,openapi,git,env-file,config,exposure,file,default-login,jenkins,grafana,kibana,aws-s3,s3,springboot,actuator"
      severity: "low,medium,high,critical"
      input_file: "live_hosts"
    secrets:
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}

  # ─── 2. JS SECRETS SCAN ────────────────────────────────────────
  # Katana crawls every live host, finds hidden URLs and JS files
  # Nuclei then scans those URLs specifically for secrets and keys
  # Tags narrowed to only what finds things inside JS files
  # This is the real API key goldmine — no other scan covers this
  weekly_js_secrets:
    uses: ./.github/workflows/scan-template.yml
    with:
      scan_name: "JS Secrets"
      tags: "exposure,token,secret,api-key,generic-tokens,file,config"
      severity: "low,medium,high,critical"
      use_katana: true
      input_file: "live_hosts"
    secrets:
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}

  # ─── 3. CUSTOM TEMPLATES ───────────────────────────────────────
  # Runs ONLY our hand-crafted templates — no nuclei defaults mixed in
  # Tags left empty so scan-template runs custom-templates folder exclusively
  # Covers: graphql-field-suggestion-leak, spring-boot-actuator-exposed,
  #         swagger-unauthenticated-execution
  # Better precision than nuclei defaults for these specific checks
  weekly_custom:
    uses: ./.github/workflows/scan-template.yml
    with:
      scan_name: "Custom Templates"
      tags: ""
      severity: "low,medium,high,critical"
      input_file: "live_hosts"
    secrets:
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
