name: New Asset Hot Scan

on:
  workflow_run:
    workflows: ["Weekly Recon Pipeline"]
    types:
      - completed

jobs:
  # ─── 1. CVE / PANEL / MISCONFIG SCAN ───────────────────────────
  # Runs against new_live_hosts directly — no katana
  # Full tag coverage except secrets (those go to job 2 via katana)
  scan_new_assets:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    uses: ./.github/workflows/scan-template.yml
    with:
      scan_name: "New Asset Hot Scan"
      tags: "cve,cors,panel,admin,takeover,subdomain-takeover,403,jwt,graphql,swagger,api-docs,openapi,git,env-file,default-login,jenkins,grafana,kibana,aws-s3,s3,springboot,actuator"
      severity: "low,medium,high,critical"
      input_file: "new_live_hosts"
    secrets:
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}

  # ─── 2. JS SECRETS SCAN ON NEW ASSETS ──────────────────────────
  # Katana crawls new hosts, nuclei looks for secrets in JS only
  # Kept separate so CVE templates never run against crawled JS URLs
  scan_new_assets_js:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    uses: ./.github/workflows/scan-template.yml
    with:
      scan_name: "New Asset JS Secrets"
      tags: "token,secret,api-key,generic-tokens"
      severity: "low,medium,high,critical"
      use_katana: true
      input_file: "new_live_hosts"
    secrets:
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
