name: Daily Scans
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

# Runs all daily scanners sequentially to avoid burning minutes in parallel
# Order: fastest/highest value first

jobs:

  # ─── 1. TAKEOVER ───────────────────────────────────────────────
  # Uses 404 hosts only — pre-filtered by weekly recon
  takeover:
    uses: ./.github/workflows/scan-template.yml
    with:
      scan_name: "Subdomain Takeover"
      tags: "takeover,subdomain-takeover"
      input_file: "live_hosts_404"
    secrets:
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}

  # ─── 2. CVE ────────────────────────────────────────────────────
  # High/critical only to reduce noise
  cve:
    needs: takeover
    uses: ./.github/workflows/scan-template.yml
    with:
      scan_name: "CVE"
      tags: "cve"
      severity: "high,critical"
    secrets:
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}

  # ─── 3. 403 BYPASS ─────────────────────────────────────────────
  # Uses 403 hosts only — pre-filtered by weekly recon
  bypass_403:
    needs: cve
    uses: ./.github/workflows/scan-template.yml
    with:
      scan_name: "403 Bypass"
      tags: "403"
      input_file: "live_hosts_403"
    secrets:
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}

  # ─── 4. SECRETS ────────────────────────────────────────────────
  # Uses katana to crawl URLs first then scan for exposed secrets
  secrets:
    needs: bypass_403
    uses: ./.github/workflows/scan-template.yml
    with:
      scan_name: "Exposed Secrets"
      tags: "token,secret,api-key,exposure"
      use_katana: true
    secrets:
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}

  # ─── 5. CORS ───────────────────────────────────────────────────
  cors:
    needs: secrets
    uses: ./.github/workflows/scan-template.yml
    with:
      scan_name: "CORS Misconfiguration"
      tags: "cors"
    secrets:
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}

  # ─── 6. ADMIN PANELS ───────────────────────────────────────────
  admin_panels:
    needs: cors
    uses: ./.github/workflows/scan-template.yml
    with:
      scan_name: "Admin Panels"
      tags: "panel,admin"
    secrets:
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
