name: Weekly Recon Pipeline
on:
  schedule:
    - cron: '0 1 * * 0'
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      batches: ${{ steps.split.outputs.batches }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter and split domains
        id: split
        run: |
          # Remove big tech, duplicates, wildcards
          grep -vEi "^#|^$" domains.txt | \
          grep -vEi "google\.|microsoft\.|apple\.|amazon\.|facebook\.|meta\.|twitter\.|netflix\.|linkedin\.|github\." | \
          grep -v '^\*\.' | \
          sort -u > domains_clean.txt || true

          total=$(wc -l < domains_clean.txt)
          num_batches=$(( (total + 49) / 50 ))
          batches=$(seq 1 $num_batches | jq -R . | jq -sc .)
          echo "batches=$batches" >> $GITHUB_OUTPUT
          echo "Original domains: $(wc -l < domains.txt)"
          echo "Clean domains: $total"
          echo "Total batches: $num_batches"

      - name: Upload clean domains
        uses: actions/upload-artifact@v4
        with:
          name: domains-clean
          path: domains_clean.txt

  discover:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 350
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        batch: ${{ fromJson(needs.prepare.outputs.batches) }}
    steps:
      - name: Cache Go tools
        uses: actions/cache@v4
        id: cache-tools
        with:
          path: ~/go/bin
          key: go-tools-${{ runner.os }}-v2

      - name: Install tools
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          go install github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest
          go install github.com/projectdiscovery/httpx/cmd/httpx@latest

      - name: Download clean domains
        uses: actions/download-artifact@v4
        with:
          name: domains-clean

      - name: Run subfinder on batch
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          start=$(( (${{ matrix.batch }} - 1) * 50 + 1 ))
          sed -n "${start},$((start + 49))p" domains_clean.txt > batch_domains.txt
          echo "Batch ${{ matrix.batch }}: $(wc -l < batch_domains.txt) domains"

          subfinder -dL batch_domains.txt \
            -silent \
            -timeout 30 \
            -t 10 \
            -max-time 300 \
            -o subs_raw.txt || true

          # Filter garbage
          cat subs_raw.txt | \
            grep -vP '^\d+[-\.]\d+[-\.]\d+[-\.]\d+\.' | \
            grep -v '^\*\.' | \
            grep -vE '^[a-f0-9]{32}\.' | \
            grep -vE '\.(png|jpg|gif|css|js)$' | \
            sort -u > batch_subs.txt || true

          echo "Batch ${{ matrix.batch }} subdomains: $(wc -l < batch_subs.txt)"

      - name: Upload batch results
        uses: actions/upload-artifact@v4
        with:
          name: subs-batch-${{ matrix.batch }}
          path: batch_subs.txt
          if-no-files-found: warn

  combine_and_probe:
    needs: [prepare, discover]
    runs-on: ubuntu-latest
    timeout-minutes: 350
    if: ${{ always() && needs.prepare.result == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Go tools
        uses: actions/cache@v4
        id: cache-tools
        with:
          path: ~/go/bin
          key: go-tools-${{ runner.os }}-v2

      - name: Download all subdomain artifacts
        uses: actions/download-artifact@v4
        with:
          path: all_subs
          pattern: subs-batch-*

      - name: Combine and deduplicate
        run: |
          find all_subs -name "*.txt" | xargs cat 2>/dev/null | \
            sort -u | \
            grep -v '^\*\.' | \
            grep -vE '^[0-9]{1,3}\.[0-9]' | \
            grep -vE '^[a-f0-9]{32}\.' > all_subdomains_clean.txt || true

          echo "Total unique subdomains: $(wc -l < all_subdomains_clean.txt)"

      - name: Run httpx with smart filtering
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin

          # First pass — get all live hosts with metadata
          httpx -l all_subdomains_clean.txt \
            -silent \
            -timeout 8 \
            -retries 0 \
            -rl 150 \
            -threads 50 \
            -mc 200,201,301,302,303,401,403,404,405,500 \
            -title \
            -status-code \
            -tech-detect \
            -no-color \
            -o httpx_full.txt || true

          echo "Raw httpx results: $(wc -l < httpx_full.txt)"

          # Extract just URLs for nuclei (strip metadata)
          awk '{print $1}' httpx_full.txt | sort -u > live_hosts_all.txt

          # High value targets — filter out noise
          # Keep: 200, 301, 302, 403 — skip pure 404/500 for most scans
          grep -E '\[200\]|\[201\]|\[301\]|\[302\]|\[303\]|\[401\]|\[403\]' httpx_full.txt | \
            awk '{print $1}' | sort -u > live_hosts.txt || true

          # Special list — 403 only for bypass scanner
          grep '\[403\]' httpx_full.txt | \
            awk '{print $1}' | sort -u > live_hosts_403.txt || true

          # Special list — 404 only for takeover scanner
          grep '\[404\]' httpx_full.txt | \
            awk '{print $1}' | sort -u > live_hosts_404.txt || true

          echo "=== FINAL COUNTS ==="
          echo "All live: $(wc -l < live_hosts_all.txt)"
          echo "Main targets (live_hosts.txt): $(wc -l < live_hosts.txt)"
          echo "403 targets: $(wc -l < live_hosts_403.txt)"
          echo "404 targets (takeover): $(wc -l < live_hosts_404.txt)"

      - name: Commit results
        run: |
          git config --global user.email "bugbountybot@github.com"
          git config --global user.name "BugBountyBot"
          git add live_hosts.txt live_hosts_403.txt live_hosts_404.txt all_subdomains_clean.txt
          git diff --staged --quiet || git commit -m "Weekly recon update $(date +'%Y-%m-%d') - $(wc -l < live_hosts.txt) live hosts"
          git push
