# scan-newassets.yml
# Triggered automatically when weekly recon completes
# Scans only brand new subdomains with everything — daily + weekly tags combined
# New assets = highest priority, developers just deployed them likely unsecured
# Silent exit if no new hosts found — zero noise
name: New Asset Hot Scan
on:
  workflow_run:
    workflows: ["Weekly Recon Pipeline"]
    types:
      - completed

jobs:
  scan_new_assets:
    # Only run if recon succeeded and there are new hosts
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    uses: ./.github/workflows/scan-template.yml
    with:
      scan_name: "New Asset Hot Scan"
      # All daily + weekly tags combined — hit new assets with everything at once
      tags: "cve,cors,panel,admin,token,secret,api-key,exposure,takeover,subdomain-takeover,403,jwt,graphql,swagger,api-docs,openapi,git,env-file,config,file,default-login,jenkins,grafana,kibana,aws-s3,s3,springboot,actuator"
      severity: "low,medium,high,critical"
      input_file: "new_live_hosts"
    secrets:
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
